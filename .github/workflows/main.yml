name: CI

on: ["workflow_dispatch", "pull_request"]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.cache/bepinex
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run the Cake script
        uses: cake-build/cake-action@v3
        with:
          verbosity: Diagnostic

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: TownOfUsMira.dll
          path: TownOfUs/bin/Release/TownOfUsMira.dll
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: TownOfUsMira.nupkg
          path: TownOfUs/bin/Release/TownOfUsMira.*.nupkg
          retention-days: 7

      - uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag' && github.event_name != 'pull_request'
        with:
          draft: true
          files: TownOfUs/bin/Release/TownOfUsMira.dll
          
      - name: Push NuGet CI
        if: github.ref == 'refs/heads/dev'
        run: |
          dotnet nuget push TownOfUs/bin/Release/TownOfUsMira.*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          
      - name: Push NuGet Release
        if: github.ref_type == 'tag'
        run: |
          dotnet nuget push TownOfUs/bin/Release/TownOfUsMira.*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
